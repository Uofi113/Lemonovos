groups:
  - name: "Гейминг и Развлечения"
    description: "Все, чтобы превратить LemonovOS в игровую станцию."
    critical: false
    subgroups:
      - name: "Lemonov Gaming"
        description: "Полный набор: Steam, Wine, Proton, MangoHud и оптимизации."
        packages:
          - lemonovos-gaming
      - name: "Эмуляторы и лаунчеры"
        description: "Дополнительные инструменты для игроков."
        packages:
          - lutris
          - heroic-games-launcher-bin
          - bottles

  - name: "Интернет и Общение"
    description: "Браузеры и мессенджеры."
    critical: false
    subgroups:
      - name: "Браузеры"
        description: "Выбери свой доступ в сеть."
        packages:
          - firefox
          - chromium
      - name: "Мессенджеры"
        description: "Связь с миром."
        packages:
          - telegram-desktop
          - discord
          - vesktop # Тот же дискорд, но с работающим показом экрана в Wayland

  - name: "Работа с Медиа"
    description: "Воспроизведение и создание контента."
    critical: false
    subgroups:
      - name: "Плееры и Кодеки"
        description: "Чтобы открывалось любое видео."
        packages:
          - vlc
          - mpv # Легкая альтернатива VLC
          - gst-plugins-bad
          - libdvdcss
          - pipewire-codec-aptx # Для качественного звука в Bluetooth ушах
      - name: "Графика и Офис"
        description: "Базовый набор для работы."
        packages:
          - libreoffice-fresh
          - gimp
          - obsidian # Для заметок

  - name: "Системные компоненты"
    description: "Важные дополнения для железа и ядра."
    critical: false
    subgroups:
      - name: "Ядро и Разработка"
        description: "Необходимо для сборки драйверов и софта."
        packages:
          - linux-zen-headers
          - base-devel
          - git
      - name: "Низкоуровневые либы (32-бит)"
        description: "Нужны для старых игр и Wine."
        packages:
          - lib32-giflib
          - lib32-gnutls
          - lib32-vulkan-icd-loader
          - lib32-mesa
      - name: "Поддержка железа и ФС"
        description: "То, что ты считал мусором, но иногда оно спасает (например, флешки)."
        packages:
          - exfatprogs # Чтобы работали флешки > 32ГБ
          - bolt # Для работы Thunderbolt/Type-C док-станций
          - ntfs-3g
          - bat # Улучшенный 'cat' с подсветкой (в стиле LemonovOS)

  - name: "Продвинутая Сеть и Спасение"
    description: "Инструменты для тех, кто знает, что делает."
    critical: false
    subgroups:
      - name: "Анализ и VPN"
        description: "Сетевые утилиты."
        packages:
          - nmap
          - tcpdump
          - openconnect
          - wireguard-tools
      - name: "Восстановление"
        description: "Если диск решил 'уйти'."
        packages:
          - testdisk
          - ddrescue
          - clonezilla

  - name: "Консольный уголок (на любителя)"
    description: "Тот самый 'мусор' и терминальные штуки."
    critical: false
    subgroups:
      - name: "Текстовые редакторы"
        description: "Для правки конфигов руками."
        packages:
          - vim
          - micro # Намного удобнее вима для новичков
      - name: "Терминальное ретро"
        description: "Lynx, IRC и прочее."
        packages:
          - lynx
          - irssi
