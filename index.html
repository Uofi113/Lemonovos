<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LemonovOS | Dashboard</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <style>
        :root {
            --bg-base: #11111b; 
            --bg-mantle: #181825;
            --bg-crust: #11111b;
            --app-bg: rgba(30, 30, 46, 0.75); 
            --sidebar-bg: rgba(24, 24, 37, 0.85);
            --card-bg: rgba(49, 50, 68, 0.4);
            --card-hover: rgba(69, 71, 90, 0.6);
            --accent: #cba6f7; 
            --accent-glow: rgba(203, 166, 247, 0.15);
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --text-sub: #7f849c;
            --border: rgba(255, 255, 255, 0.05);
            --border-highlight: rgba(203, 166, 247, 0.3);
            --success: #a6e3a1;
            --warning: #f9e2af;
            --danger: #f38ba8;
            --glass-blur: blur(20px);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* ИСПРАВЛЕНО: Теперь работает и для <button disabled>, и для <a class="disabled"> */
        .btn:disabled,
        .btn.disabled {
            opacity: 0.5;             /* Делаем её полупрозрачной */
            cursor: not-allowed;      /* Курсор при наведении изменится на перечеркнутый круг */
            pointer-events: none;     /* Железобетонная дополнительная блокировка кликов */
        }
        
        [data-theme="light"] {
            --bg-base: #e6e9ef;
            --bg-mantle: #dce0e8;
            --bg-crust: #e6e9ef;
            --app-bg: rgba(239, 241, 245, 0.8);
            --sidebar-bg: rgba(220, 224, 232, 0.85);
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-hover: rgba(255, 255, 255, 0.95);
            --accent: #8839ef;
            --accent-glow: rgba(136, 57, 239, 0.1);
            --text-main: #4c4f69;
            --text-muted: #7c7f93;
            --text-sub: #8c8fa1;
            --border: rgba(0, 0, 0, 0.05);
            --border-highlight: rgba(136, 57, 239, 0.3);
            --success: #40a02b;
            --warning: #df8e1d;
            --danger: #d20f39;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .blob-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; filter: blur(90px); opacity: 0.3; animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--accent); animation-delay: 0s; }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #89b4fa; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        .app-window {
            display: flex; width: 96vw; max-width: 1600px; height: 92vh;
            background: var(--app-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 24px; border: 1px solid var(--border);
            box-shadow: 0 40px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            z-index: 10; overflow: hidden;
        }

        .sidebar {
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 30px 20px; position: relative;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; padding: 0 10px; cursor: pointer; user-select: none; }
        .logo-icon {
            width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent), #89b4fa);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px var(--accent-glow);
        }
        .logo-icon svg { width: 22px; height: 22px; color: var(--bg-base); fill: currentColor;}
        .logo-text { font-size: 1.3rem; font-weight: 800; letter-spacing: 0.5px; }

        .nav-links { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .nav-links::-webkit-scrollbar { width: 4px; }
        .nav-links::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        .nav-item {
            padding: 12px 16px; border-radius: 12px; color: var(--text-muted);
            text-decoration: none; font-weight: 600; font-size: 0.95rem;
            display: flex; align-items: center
