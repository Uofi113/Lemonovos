<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LemonovOS | Official</title>
    <style>
        :root {
            /* Темная тема (твоя, с '#122a4d' для ползунка) */
            --bg: #0a192f;
            --card: rgba(17, 34, 64, 0.8);
            --accent: #64ffda;
            --text: #ccd6f6;
            --text-dim: #8892b0;
            --nav: rgba(10, 25, 47, 0.95);
            --border: rgba(100, 255, 218, 0.1);
            --toggle-bg: #122a4d; /* Вот твой цвет для тёмной темы */
        }

        [data-theme="light"] {
            /* Светлая тема */
            --bg: #fff9e6;
            --card: #ffffff;
            --accent: #d4a017;
            --text: #4a4028;
            --text-dim: #7d735a;
            --nav: rgba(255, 249, 230, 0.95);
            --border: rgba(212, 160, 23, 0.2);
            --toggle-bg: #f3e5ab;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: 0.3s ease;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .theme-switch-wrapper {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1100;
        }

        .theme-switch {
            display: inline-block;
            height: 30px;
            position: relative;
            width: 60px;
        }

        .theme-switch input { display: none; }

        .slider {
            background-color: var(--toggle-bg);
            bottom: 0; cursor: pointer; left: 0;
            position: absolute; right: 0; top: 0;
            transition: .4s; border-radius: 34px;
            border: 1px solid var(--border);
        }

        .slider:before {
            background-color: var(--accent);
            bottom: 3px; content: "🌙";
            height: 22px; left: 4px;
            position: absolute; transition: .4s;
            width: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }

        input:checked + .slider:before {
            transform: translateX(30px);
            content: "☀️";
            background-color: #ffcc00;
        }

        nav {
            display: flex; justify-content: center; gap: 12px;
            padding: 15px 5px; background: var(--nav);
            backdrop-filter: blur(10px); position: fixed;
            width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        nav a {
            color: var(--text); text-decoration: none;
            font-size: 10px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .container { 
            max-width: 900px; 
            margin: 80px auto 20px; 
            padding: 0 15px; 
        }

        section {
            display: none; background: var(--card);
            padding: 25px 20px; border-radius: 12px;
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { color: var(--accent); font-size: 1.8rem; margin-top: 0; }

        .gallery {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px; margin: 20px 0;
        }

        .gallery-item {
            border-radius: 10px; overflow: hidden;
            border: 1px solid var(--border); 
            background: var(--bg);
        }

        .gallery-item img { 
            width: 100%; 
            height: auto; 
            max-height: 250px;
            object-fit: cover; 
            display: block;
        }

        .label { 
            padding: 12px; 
            text-align: center; 
            font-size: 0.8rem; 
            color: var(--text-dim);
            background-color: var(--bg);
            transition: 0.3s ease;
        }

        .btn {
            display: block; text-align: center;
            padding: 12px; border: 2px solid var(--accent); 
            color: var(--accent); text-decoration: none; 
            border-radius: 6px; font-weight: bold; margin-top: 10px;
        }

        @media (min-width: 600px) {
            h1 { font-size: 2.5rem; }
            nav { gap: 30px; padding: 22px; }
            nav a { font-size: 12px; letter-spacing: 2px; }
            .container { margin-top: 120px; }
            section { padding: 40px; }
            .btn { display: inline-block; padding: 15px 30px; }
        }
    </style>
</head>
<body>

<div class="theme-switch-wrapper">
    <label class="theme-switch">
        <input type="checkbox" id="theme-checkbox">
        <div class="slider"></div>
    </label>
</div>

<nav>
    <a href="#about">Проект</a>
    <a href="#download">Загрузка</a>
    <a href="#changelog">Дневник</a>
</nav>

<div class="container">
    <section id="about">
        <h1>LemonovOS</h1>
        <p>Производительная система на базе Arch Linux. Минимум фоновых процессов, максимум контроля.</p>
        
        <div class="gallery">
            <div class="gallery-item">
                <img src="img/desktop-dark.jpg" class="theme-img" alt="Desktop" data-dark="img/desktop-dark.jpg" data-light="img/desktop-light.jpg">
                <div class="label">Окружение системы</div>
            </div>
            <div class="gallery-item">
                <img src="img/terminal-dark.png" class="theme-img" alt="Terminal" data-dark="img/terminal-dark.png" data-light="img/terminal-light.png">
                <div class="label">Lemonov Fastfetch</div>
            </div>
        </div>
    </section>

    <section id="download">
        <h1>Скачать</h1>
        <p>Статус: <b>0.8.2 Unstable</b></p>
        <a class="btn" style="opacity: 0.5; pointer-events: none;">Скоро</a>
        <a href="https://t.me/lemonovos" class="btn" target="_blank">Telegram</a>
    </section>

    <section id="changelog">
        <h1>Дневник разработки</h1>
        <div id="issues-container">Загрузка данных...</div>
    </section>
</div>

<footer style="padding: 30px 15px; text-align: center; color: var(--text-dim); font-size: 0.75rem;">
    &copy; 2026 LemonovOS. Created by Uofi113
</footer>

<script>
    function handleRoute() {
        const hash = window.location.hash || '#about';
        document.querySelectorAll('section').forEach(s => s.style.display = 'none');
        const target = document.querySelector(hash);
        if (target) target.style.display = 'block';
    }
    window.addEventListener('hashchange', handleRoute);
    window.addEventListener('DOMContentLoaded', handleRoute);

    const themeBtn = document.getElementById('theme-checkbox');
    const themeImages = document.querySelectorAll('.theme-img');

    function updateImages(theme) {
        themeImages.forEach(img => {
            const src = img.getAttribute(`data-${theme}`);
            if(src) img.src = src;
        });
    }
    
    if (localStorage.getItem('theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        themeBtn.checked = true;
        updateImages('light');
    }

    themeBtn.addEventListener('change', () => {
        const theme = themeBtn.checked ? 'light' : 'dark';
        if (theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        } else {
            document.documentElement.removeAttribute('data-theme');
        }
        localStorage.setItem('theme', theme);
        updateImages(theme);
    });

    /* Функция форматирования заголовков Issue (твои кружки) */
    function formatTitle(t) {
        if (t.startsWith('+')) return '🟢 ' + t.slice(1).trim();
        if (t.startsWith('-')) return '🔴 ' + t.slice(1).trim();
        if (t.startsWith('*')) return '🔵 ' + t.slice(1).trim();
        return '⚪ ' + t;
    }

    async function getChangelog() {
        const box = document.getElementById('issues-container');
        try {
            const r = await fetch('https://api.github.com/repos/Uofi113/Lemonovos/issues?state=open');
            const data = await r.json();
            box.innerHTML = data.map(i => {
                const cleanBody = (i.body || '').replace(/\r/g, '').replace(/\n/g, '<br>'); // Убираем перенос строк
                return `
                <div style="border-left: 3px solid var(--accent); padding: 10px 15px; margin-bottom: 25px; background: rgba(100, 255, 218, 0.05);">
                    <div style="color: var(--accent); font-size: 0.8rem;">${new Date(i.created_at).toLocaleDateString()}</div>
                    <div style="font-weight: bold; font-size: 1.1rem; margin: 5px 0;">${formatTitle(i.title)}</div>
                    <div style="font-size: 0.9rem; color: var(--text-dim); line-height: 1.4;">${cleanBody}</div>
                </div>`;
            }).join('');
        } catch(e) { box.innerHTML = 'Ошибка синхронизации.'; }
    }
    getChangelog();
</script>
</body>
</html>
