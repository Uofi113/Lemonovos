<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LemonovOS | Official</title>
    <style>
        :root {
            /* Темная тема (основная) */
            --bg: #0a192f;
            --card: rgba(17, 34, 64, 0.8);
            --accent: #64ffda;
            --text: #ccd6f6;
            --text-dim: #8892b0;
            --nav: rgba(10, 25, 47, 0.9);
            --border: rgba(100, 255, 218, 0.1);
            --toggle-bg: #112240;
        }

        [data-theme="light"] {
            /* Нежно-банановая тема */
            --bg: #fff9e6;
            --card: #ffffff;
            --accent: #d4a017;
            --text: #4a4028;
            --text-dim: #7d735a;
            --nav: rgba(255, 249, 230, 0.9);
            --border: rgba(212, 160, 23, 0.2);
            --toggle-bg: #f3e5ab;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: 0.3s ease;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Улучшенный ползунок темы */
        .theme-switch-wrapper {
            position: fixed;
            top: 20px;
            right: 25px;
            z-index: 1100;
        }

        .theme-switch {
            display: inline-block;
            height: 38px;
            position: relative;
            width: 76px;
        }

        .theme-switch input { display: none; }

        .slider {
            background-color: var(--toggle-bg);
            bottom: 0; cursor: pointer; left: 0;
            position: absolute; right: 0; top: 0;
            transition: .4s; border-radius: 34px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .slider:before {
            background-color: var(--accent);
            bottom: 4px; content: "🌙";
            height: 30px; left: 4px;
            position: absolute; transition: .4s;
            width: 30px; border-radius: 50%;
            z-index: 2;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        input:checked + .slider:before {
            transform: translateX(38px);
            content: "☀️";
            background-color: #ffcc00; /* Цвет бананового солнца */
        }

        nav {
            display: flex; justify-content: center; gap: 30px;
            padding: 22px; background: var(--nav);
            backdrop-filter: blur(10px); position: fixed;
            width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        nav a {
            color: var(--text); text-decoration: none;
            font-size: 12px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .container { max-width: 900px; margin: 120px auto 20px; padding: 0 20px; flex: 1; }

        section {
            display: none; background: var(--card);
            padding: 40px; border-radius: 15px;
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { color: var(--accent); font-size: 2.5rem; margin-top: 0; }

        .gallery {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px; margin: 30px 0;
        }

        .gallery-item {
            border-radius: 10px; overflow: hidden;
            border: 1px solid var(--border); background: #000;
        }

        .gallery-item img { width: 100%; height: 220px; object-fit: cover; opacity: 0.8; transition: 0.3s; }
        .gallery-item:hover img { opacity: 1; }
        .label { padding: 12px; text-align: center; font-size: 0.85rem; color: var(--text-dim); }

        .btn {
            display: inline-block; padding: 15px 30px;
            border: 2px solid var(--accent); color: var(--accent);
            text-decoration: none; border-radius: 4px;
            font-weight: bold; margin-top: 10px;
        }

        .btn.disabled { border-color: var(--text-dim); color: var(--text-dim); opacity: 0.4; pointer-events: none; }

        .changelog-item {
            border-left: 3px solid var(--accent);
            padding: 10px 20px; margin-bottom: 40px;
            background: rgba(212, 160, 23, 0.03);
        }
        .date { color: var(--accent); font-family: monospace; font-size: 0.9rem; margin-bottom: 5px; }
        .issue-title { font-weight: bold; font-size: 1.3rem; margin-bottom: 10px; }
        .issue-body { white-space: pre-wrap; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="theme-switch-wrapper">
    <label class="theme-switch">
        <input type="checkbox" id="theme-checkbox">
        <div class="slider"></div>
    </label>
</div>

<nav>
    <a href="#about">Проект</a>
    <a href="#download">Загрузка</a>
    <a href="#changelog">Дневник</a>
</nav>

<div class="container">
    <section id="about">
        <h1>LemonovOS</h1>
        <p>Производительная система на базе Arch Linux. Минимум фоновых процессов, максимум контроля.</p>
        
        <div class="gallery">
            <div class="gallery-item">
                <img src="img/desktop-dark.jpg" class="theme-img" alt="Desktop" data-dark="img/desktop-dark.jpg" data-light="img/desktop-light.jpg">
                <div class="label">Окружение системы</div>
            </div>
            <div class="gallery-item">
                <img src="img/terminal-dark.png" class="theme-img" alt="Terminal" data-dark="img/terminal-dark.png" data-light="img/terminal-light.png">
                <div class="label">Lemonov Fastfetch</div>
            </div>
        </div>
    </section>

    <section id="download">
        <h1>Скачать</h1>
        <p>Статус: <b>0.8.2 Unstable</b></p>
        <a class="btn disabled">Скачать ISO</a>
        <a href="https://t.me/lemonovos" class="btn" target="_blank">Telegram</a>
    </section>

    <section id="changelog">
        <h1>Дневник разработки</h1>
        <div id="issues-container">Загрузка логов...</div>
    </section>
</div>

<footer style="padding: 40px 20px 20px; text-align: center;">
    <div style="color: var(--text-dim); font-size: 0.8rem;">
        &copy; 2026 LemonovOS. Created by Uofi113
    </div>
</footer>

<script>
    function handleRoute() {
        const hash = window.location.hash || '#about';
        document.querySelectorAll('section').forEach(s => s.style.display = 'none');
        const target = document.querySelector(hash);
        if (target) target.style.display = 'block';
    }
    window.addEventListener('hashchange', handleRoute);
    window.addEventListener('DOMContentLoaded', handleRoute);

    const themeBtn = document.getElementById('theme-checkbox');
    const themeImages = document.querySelectorAll('.theme-img'); // Все динамические картинки

    // Функция обновления скриншотов
    function updateImages(theme) {
        themeImages.forEach(img => {
            img.src = img.getAttribute(`data-${theme}`);
        });
    }
    
    // Проверка сохраненной темы при загрузке
    if (localStorage.getItem('theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        themeBtn.checked = true;
        updateImages('light'); // Сразу ставим светлые скрины
    }

    // Слушатель переключателя
    themeBtn.addEventListener('change', () => {
        if (themeBtn.checked) {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
            updateImages('light'); // Меняем скрины на светлые
        } else {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'dark');
            updateImages('dark'); // Меняем скрины на тёмные
        }
    });

    function formatTitle(t) {
        if (t.startsWith('+')) return '🟢 ' + t.slice(1).trim();
        if (t.startsWith('-')) return '🔴 ' + t.slice(1).trim();
        if (t.startsWith('*')) return '🔵 ' + t.slice(1).trim();
        return '⚪ ' + t;
    }

    async function getChangelog() {
        const box = document.getElementById('issues-container');
        try {
            const r = await fetch('https://api.github.com/repos/Uofi113/Lemonovos/issues?state=open');
            const data = await r.json();
            box.innerHTML = data.map(i => {
                const d = new Date(i.created_at);
                return `
                <div class="changelog-item">
                    <div class="date">${d.toLocaleDateString()} в ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    <div class="issue-title">${formatTitle(i.title)}</div>
                    <div class="issue-body">${i.body}</div>
                </div>`;
            }).join('');
        } catch(e) { box.innerHTML = 'Ошибка синхронизации.'; }
    }
    getChangelog();
</script>
</body>
</html>
