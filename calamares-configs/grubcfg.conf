---
bootloaderEntryName: "LemonovOS"

kernel_type: "linux-zen"
keep_distributor: false
overwrite: true

defaults:
    GRUB_TIMEOUT: 5
    GRUB_DISTRIBUTOR: "LemonovOS"
    GRUB_CMDLINE_LINUX_DEFAULT: "quiet splash udev.log_priority=3"
    GRUB_CMDLINE_LINUX: ""
    GRUB_TERMINAL_OUTPUT: "gfxterm"
    GRUB_GFXMODE: "auto"
    GRUB_DISABLE_RECOVERY: "true"
