---
overwrite: true

keep_distributor: false

kernel_type: "linux-zen"

defaults:
    GRUB_TIMEOUT: 5
    GRUB_DISTRIBUTOR: "LemonovOS"
    GRUB_CMDLINE_LINUX_DEFAULT: "quiet splash"
    GRUB_CMDLINE_LINUX: ""
    GRUB_TERMINAL_OUTPUT: "console"
    GRUB_DISABLE_SUBMENU: y
    GRUB_GFXMODE: auto
    GRUB_DISABLE_RECOVERY: true

extra_prepare_check_commands:
    - "os-prober"
