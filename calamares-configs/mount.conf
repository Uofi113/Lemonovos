---
extraMounts:
    - device: proc
      mountPoint: /proc
    - device: sys
      mountPoint: /sys
    - device: dev
      mountPoint: /dev
    - device: tmpfs
      mountPoint: /run
    - device: /dev/pts
      mountPoint: /dev/pts
      options: bind

extraMountsEfi:
    - device: efivarfs
      mountPoint: /sys/firmware/efi/efivars
